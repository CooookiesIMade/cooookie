<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"/>
 <link rel="stylesheet" href="/css/chat.css">
<body>
<input type="text" placeholder="보낼 메세지를 입력하세요." class="content">
<button type="button" value="전송" class="sendBtn" onclick="sendMsg()">전송</button>
<button type="button" value="방나가기" class="quit" onclick="quit()">방 나가기 </button>
<div>
    <span>메세지</span>
    <div class="msgArea"></div>
</div>
</body>


<script th:inline="javascript">
		let sender = /*[[${session.signInMember.member_id}]]*/'';
		let user = /*[[${room.sender}]]*/'';
		let host = /*[[${room.host_name}]]*/'';
		console.log(sender);
		console.log(user);
		console.log(host)
		
		
        function enterRoom(socket){
            var enterMsg={"type" : "ENTER","roomId":/*[[${room.roomId}]]*/'',"sender":sender,"msg":""}; //sender는  글쓸때 수정하자.
            socket.send(JSON.stringify(enterMsg));
        }
        let socket = new WebSocket("ws://localhost:9001/ws/chat");

        socket.onopen = function (e) {
            console.log('open server!')
            enterRoom(socket);
        };
        socket.onclose=function(e){
            console.log('disconnet');
        }

        socket.onerror = function (e){
            console.log(e);
        }

        //메세지 수신했을 때 이벤트.
        socket.onmessage = function (e) {
            console.log(e.data);
            let msgArea = document.querySelector('.msgArea');
            let newMsg = document.createElement('div');
            newMsg.innerText=e.data;
            msgArea.append(newMsg);
        }


        //메세지 보내기 버튼 눌렀을 떄..
        function sendMsg() {
            let content=document.querySelector('.content').value;
             var talkMsg={"type" : "TALK","roomId":/*[[${room.roomId}]]*/'',"sender":sender,"msg":content};
        	   socket.send(JSON.stringify(talkMsg));
        }

        function quit(){
             var quitMsg={"type" : "QUIT","roomId":/*[[${room.roomId}]]*/'',"sender":sender,"msg":""};
           socket.send(JSON.stringify(quitMsg));
            socket.close();
            location.href='/place/list';
        }

</script>

</html>
